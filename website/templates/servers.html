<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serveurs — TicketMP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="margin-left:0;">

<div class="main" style="margin-left:0;max-width:1100px;margin-inline:auto;">

    <header class="page-head" style="margin-top:20px;">
        <div>
            <h1>🖥️ Bienvenue, {{ user.username }}</h1>
            <p>Choisis un serveur à administrer avec TicketMP</p>
        </div>
        <a href="/logout" class="btn secondary sm">🚪 Déconnexion</a>
    </header>

    <div class="cards" style="margin-top:30px;">

        {% for guild in guilds %}
        <div class="card">
            <div class="stat-icon">🏠</div>
            <h3 style="margin:14px 0 4px;font-size:17px;">{{ guild.name }}</h3>
            <span class="id-tag" style="font-size:12px;">ID : <code>{{ guild.id }}</code></span>

            <a href="/dashboard/{{ guild.id }}" class="btn block" style="margin-top:20px;">
                ⚙️ Configurer
            </a>
        </div>
        {% else %}
        <div class="empty" style="grid-column:1/-1;">
            📭 Aucun serveur administrable trouvé sur ton compte Discord.
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
